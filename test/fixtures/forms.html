<html>
<body>
<h2>Contact Form</h2>
<form>
<label>Name:</label>
<input type="text" name="name" placeholder="Enter your name">

<label>Email:</label>
<input type="email" name="email" placeholder="Enter your email">

<label>Message:</label>
<textarea name="message" rows="4" placeholder="Enter your message"></textarea>

<label>Country:</label>
<select name="country">
<option value="">Select a country</option>
<option value="us">United States</option>
<option value="uk">United Kingdom</option>
<option value="ca">Canada</option>
<option value="au">Australia</option>
</select>

<label>
<input type="checkbox" name="subscribe"> Subscribe to newsletter
</label>

<label>
<input type="radio" name="priority" value="low"> Low Priority
<input type="radio" name="priority" value="high"> High Priority
</label>

<button type="submit">Send Message</button>
</form>

<h2>Registration Form</h2>
<form>
<fieldset>
<legend>User Information</legend>
<input type="text" placeholder="Username">
<input type="password" placeholder="Password">
</fieldset>

<fieldset>
<legend>Preferences</legend>
<select>
<option>Theme: Light</option>
<option>Theme: Dark</option>
</select>
</fieldset>
</form>
</body>
</html>
